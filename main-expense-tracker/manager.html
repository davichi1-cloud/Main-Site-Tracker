<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site — Site Expense Manager</title>
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<template id="pageContent">
  <div class="mobile-topbar">
    <button id="menuBtn"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <strong>Site Expense</strong>
    <span></span>
  </div>

  <div class="topbar">
    <div>
      <h1 id="pageTitle">My Dashboard</h1>
      <div class="sub" id="pageSub">Overview of your site's expenses</div>
    </div>
    <a href="add-expense.html" class="btn btn-accent"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Add Expense</a>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="label"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg> Today's Expenses</div>
      <div class="value primary" id="statToday">—</div>
    </div>
    <div class="stat-card">
      <div class="label"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg> This Month</div>
      <div class="value" id="statMonth">—</div>
    </div>
    <div class="stat-card">
      <div class="label"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8M8 9h2"/></svg> Total Transactions</div>
      <div class="value accent" id="statCount">—</div>
    </div>
  </div>

  <div class="card" id="expenses">
    <div class="card-head">
      <h3>My Expenses</h3>
      <input type="text" id="searchBox" placeholder="Search description, vendor, category…" style="padding:9px 12px;border:1px solid var(--color-border);border-radius:8px;font-size:13px;min-width:220px;">
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Expense ID</th><th>Date</th><th>Category</th><th>Description</th>
            <th>Amount</th><th>Vendor</th><th>Payment</th><th>Submitted</th>
          </tr>
        </thead>
        <tbody id="expenseRows"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon"><svg class="ico ico-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
        <div>No expenses submitted yet. Click <strong>Add Expense</strong> to log your first one.</div>
      </div>
    </div>
  </div>
</template>

<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
